spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:sqlserver://localhost:1434;databaseName=${DATABASE_NAME};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${SQLSERVER_SA_PASSWORD}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ===============================
# NEO4J CONFIG
# ===============================
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=${NEO4J_USERNAME}
spring.neo4j.authentication.password=${NEO4J_PASSWORD}

server.forward-headers-strategy=framework
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ===============================
# MAIL CONFIG (SMTP)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===============================
# APP CONFIG
# ===============================
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.jwtSecret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwtExpirationInMs=${JWT_EXPIRATION:86400000}
app.reset-token-expiration-ms=${RESET_TOKEN_EXPIRATION:900000}
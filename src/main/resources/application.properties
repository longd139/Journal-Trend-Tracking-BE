spring.config.import=optional:file:.env[.properties]

# SQL SERVER AWS
spring.datasource.url=jdbc:sqlserver://${ENDOINT_DB}:1433;databaseName=${DATABASE_NAME};encrypt=true;trustServerCertificate=true;
spring.datasource.username=admin
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# HikariCP connection pool optimization
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Batch fetching â€” reduces N+1 queries over slow network
spring.jpa.properties.hibernate.default_batch_fetch_size=50

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ===============================
# NEO4J CONFIG
# ===============================
spring.neo4j.uri=${NEO4J_URI}
spring.neo4j.authentication.username=${NEO4J_USERNAME}
spring.neo4j.authentication.password=${NEO4J_PASSWORD}
spring.neo4j.database=${NEO4J_DATABASE:neo4j}
# In log Cypher Ä‘á»ƒ dá»… debug Ä‘á»“ Ã¡n
logging.level.org.springframework.data.neo4j=INFO
server.forward-headers-strategy=framework
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ===============================
# MAIL CONFIG (SMTP)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===============================
# CACHE CONFIG (Caffeine)
# ===============================
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=1h,maximumSize=500,recordStats

# ===============================
# APP CONFIG
# ===============================
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.jwtSecret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwtExpirationInMs=${JWT_EXPIRATION:86400000}
app.reset-token-expiration-ms=${RESET_TOKEN_EXPIRATION:900000}
app.verification-token-expiration-ms=${VERIFICATION_TOKEN_EXPIRATION:86400000}
app.core-api-key=${CORE_API_KEY:}
# OpenAlex polite pool â€” add your email for higher free-tier rate limits
# Register at https://openalex.org/pricing to get API credits if needed
app.openalex-email=${OPENALEX_EMAIL:}
app.google-client-id=${GOOGLE_CLIENT_ID:}

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:sqlserver://localhost:1434;databaseName=${DATABASE_NAME};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${SQLSERVER_SA_PASSWORD}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ===============================
# NEO4J CONFIG
# ===============================
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=${NEO4J_USERNAME}
spring.neo4j.authentication.password=${NEO4J_PASSWORD}